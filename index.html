<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>你可以在這裡休息</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Georgia','Times New Roman',serif;background:#0f0e17;color:#fff;height:100vh;overflow:hidden;user-select:none;}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;transition:opacity 1s ease,transform .7s ease;}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(14px);}

#loading{position:fixed;inset:0;background:#0f0e17;z-index:200;display:flex;align-items:center;justify-content:center;transition:opacity 1s;}
#loading.gone{opacity:0;pointer-events:none;}
.ldot{width:7px;height:7px;background:rgba(255,255,255,.35);border-radius:50%;margin:0 4px;animation:lblink 1.2s ease-in-out infinite;}
.ldot:nth-child(2){animation-delay:.2s;}.ldot:nth-child(3){animation-delay:.4s;}
@keyframes lblink{0%,100%{opacity:.2}50%{opacity:1}}

/* WELCOME */
#welcome h1{font-size:clamp(1.4rem,3.8vw,2.1rem);font-weight:300;letter-spacing:.1em;text-align:center;line-height:1.9;color:rgba(255,255,255,.88);}
#welcome p{margin-top:1rem;font-size:.9rem;color:rgba(255,255,255,.38);text-align:center;letter-spacing:.08em;}
.enter-btn{margin-top:2.8rem;background:none;border:1px solid rgba(255,255,255,.26);color:rgba(255,255,255,.62);padding:.75rem 2.8rem;border-radius:50px;font-size:.93rem;cursor:pointer;letter-spacing:.12em;transition:all .3s;font-family:inherit;}
.enter-btn:hover{border-color:rgba(255,255,255,.68);color:#fff;}

/* HOW-TO SCREEN */
#how-to{background:#0f0e17;}
.how-to-title{font-size:.72rem;color:rgba(255,255,255,.28);letter-spacing:.22em;margin-bottom:2rem;text-align:center;}
.how-to-steps{display:flex;flex-direction:column;gap:1rem;width:100%;max-width:280px;}
.how-to-step{display:flex;align-items:center;gap:1rem;opacity:0;transform:translateY(8px);transition:opacity .65s ease,transform .65s ease;}
.how-to-step.show{opacity:1;transform:translateY(0);}
.how-step-num{width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,255,255,.16);color:rgba(255,255,255,.28);font-size:.68rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:0;}
.how-step-text{font-size:.88rem;color:rgba(255,255,255,.6);letter-spacing:.06em;line-height:1.7;}
.how-to-btn{margin-top:2.6rem;background:none;border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.52);padding:.72rem 2.6rem;border-radius:50px;font-size:.9rem;cursor:pointer;letter-spacing:.12em;transition:all .3s;font-family:inherit;opacity:0;pointer-events:none;}
.how-to-btn.vis{opacity:1;pointer-events:all;}
.how-to-btn:hover{border-color:rgba(255,255,255,.62);color:#fff;}
.pick-title{font-size:.95rem;color:rgba(255,255,255,.48);letter-spacing:.14em;margin-bottom:1.8rem;text-align:center;}
.mood-single{display:flex;align-items:center;gap:1.4rem;}
.mood-arr{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.52);border-radius:50%;width:40px;height:40px;font-size:1.4rem;cursor:pointer;transition:all .25s;font-family:inherit;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mood-arr:hover{border-color:rgba(255,255,255,.55);color:#fff;background:rgba(255,255,255,.07);}
.mood-label-viewport{min-width:190px;height:2.7rem;overflow:hidden;position:relative;}
.mood-label{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.22);border-radius:50px;padding:.72rem 2rem;font-size:.98rem;color:#fff;letter-spacing:.07em;white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;position:absolute;top:0;left:0;right:0;bottom:0;}
@keyframes moodEnterLeft {from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes moodEnterRight{from{opacity:0;transform:translateX(-100%)}to{opacity:1;transform:translateX(0)}}
@keyframes moodExitLeft  {from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-100%)}}
@keyframes moodExitRight {from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(100%)}}
.mood-label.enter-left {animation:moodEnterLeft .38s cubic-bezier(.4,0,.2,1) forwards;}
.mood-label.enter-right{animation:moodEnterRight .38s cubic-bezier(.4,0,.2,1) forwards;}
.mood-label.exit-left  {animation:moodExitLeft  .38s cubic-bezier(.4,0,.2,1) forwards;}
.mood-label.exit-right {animation:moodExitRight .38s cubic-bezier(.4,0,.2,1) forwards;}
.nxt{margin-top:2.2rem;background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.52);padding:.58rem 1.8rem;border-radius:50px;font-size:.86rem;cursor:pointer;letter-spacing:.1em;transition:all .3s;opacity:0;pointer-events:none;font-family:inherit;}
.nxt.vis{opacity:1;pointer-events:all;}
.nxt:hover{border-color:rgba(255,255,255,.52);color:#fff;}

/* CAROUSEL */
#scene-screen{padding:0;overflow:hidden;background:#0f0e17;}
.carousel-viewport{position:relative;width:100%;height:100%;overflow:hidden;}
.carousel-track{display:flex;height:100%;will-change:transform;}
.c-slide{min-width:100vw;height:100vh;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;overflow:hidden;cursor:pointer;}
.slide-particles{position:absolute;inset:0;pointer-events:none;}
.slide-overlay{position:absolute;inset:0;background:rgba(0,0,0,.38);pointer-events:none;}
.scene-pick-label{position:absolute;top:2.2rem;left:50%;transform:translateX(-50%);font-size:.75rem;color:rgba(255,255,255,.32);letter-spacing:.2em;text-align:center;white-space:nowrap;z-index:5;}
.slide-info{position:relative;z-index:2;padding:2rem;text-align:center;display:flex;flex-direction:column;align-items:center;}
.slide-name{font-size:1.8rem;font-weight:300;letter-spacing:.18em;margin-bottom:1rem;}
.slide-desc{font-size:.88rem;color:rgba(255,255,255,.62);line-height:1.9;letter-spacing:.06em;max-width:280px;}
.slide-tap-hint{margin-top:1.6rem;font-size:.72rem;color:rgba(255,255,255,.3);letter-spacing:.12em;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.28}50%{opacity:.65}}
.dot-row{position:absolute;bottom:1.8rem;left:50%;transform:translateX(-50%);display:flex;gap:.5rem;z-index:10;}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.22);transition:all .3s;}
.dot.active{background:#fff;width:16px;border-radius:3px;}
.c-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:10;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;font-size:1rem;color:rgba(255,255,255,.55);}
.c-arrow:hover{background:rgba(255,255,255,.17);color:#fff;}
#c-prev{left:1rem;}#c-next{right:1rem;}

/* SANCTUARY TIME PANEL */
.t-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);border-radius:50px;padding:.52rem 1.25rem;font-size:.83rem;cursor:pointer;letter-spacing:.08em;transition:all .25s;color:rgba(255,255,255,.68);font-family:inherit;}
.t-btn:hover,.t-btn.sel{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.48);color:#fff;}
#sanctuary-time-panel{position:fixed;bottom:5.2rem;left:50%;transform:translateX(-50%);display:none;gap:.65rem;z-index:12;justify-content:center;flex-wrap:wrap;opacity:0;transition:opacity .8s ease;}
#sanctuary-time-panel.vis{display:flex;}
#sanctuary-time-panel.fade{opacity:1;}
/* Background crossfade overlay */
#scene-bg-next{position:fixed;inset:0;z-index:0;opacity:0;transition:opacity 2.2s cubic-bezier(.4,0,.2,1);pointer-events:none;}

/* SANCTUARY */
#sanctuary{padding:0;}
.scene-bg{position:fixed;inset:0;z-index:0;transition:background 2s ease;}
.scene-fx{position:fixed;inset:0;z-index:1;pointer-events:none;}
.fig-wrap{position:fixed;bottom:16%;left:50%;transform:translateX(-50%);z-index:3;text-align:center;}
.fig-svg{width:130px;opacity:0;animation:figIn 2s ease .4s forwards;}
@keyframes figIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fig-float{animation:gFloat 4.5s ease-in-out infinite;}
@keyframes gFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.msg-center{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;width:88%;max-width:350px;text-align:center;pointer-events:none;}
.msg-bubble{display:inline-block;font-size:.95rem;line-height:2;color:rgba(255,255,255,.92);letter-spacing:.06em;text-shadow:0 2px 24px rgba(0,0,0,.9),0 0 40px rgba(0,0,0,.6);opacity:0;transition:opacity .9s ease,transform .9s ease;transform:translateY(8px);}
.msg-bubble.show{opacity:1;transform:translateY(0);}
.msg-bubble.hide{opacity:0;transform:translateY(-6px);}
.sanctuary-tap-hint{display:block;margin-top:1.4rem;font-size:.68rem;color:rgba(255,255,255,.2);letter-spacing:.12em;animation:pulse 3.5s ease-in-out infinite;}
/* Time-adjust hint above time panel */
#time-adjust-hint{position:fixed;bottom:8.8rem;left:50%;transform:translateX(-50%);font-size:.62rem;color:rgba(255,255,255,.18);letter-spacing:.16em;z-index:12;display:none;opacity:0;transition:opacity 1s ease;white-space:nowrap;}
#time-adjust-hint.vis{display:block;}
#time-adjust-hint.fade{opacity:1;}
/* Volume sliders panel */
#vol-panel{position:fixed;top:4.6rem;right:1.1rem;z-index:20;display:none;flex-direction:column;gap:.55rem;opacity:0;transition:opacity .8s ease;}
#vol-panel.vis{display:flex;}
#vol-panel.fade{opacity:1;}
.vol-row{display:flex;align-items:center;gap:.55rem;}
.vol-label{font-size:.62rem;color:rgba(255,255,255,.3);letter-spacing:.05em;width:2.4rem;text-align:right;font-family:inherit;}
input[type=range]{-webkit-appearance:none;appearance:none;width:76px;height:2px;background:rgba(255,255,255,.18);border-radius:2px;cursor:pointer;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.55);cursor:pointer;transition:background .2s;}
input[type=range]::-webkit-slider-thumb:hover{background:rgba(255,255,255,.9);}
input[type=range]::-moz-range-thumb{width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.55);cursor:pointer;border:none;}
#mute-btn,#back-btn,#prev-btn{position:fixed;z-index:20;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11);cursor:pointer;transition:all .3s;color:rgba(255,255,255,.48);font-family:inherit;}
#mute-btn{top:1.1rem;right:1.1rem;border-radius:50%;width:38px;height:38px;font-size:1rem;display:none;align-items:center;justify-content:center;}
#prev-btn{top:1.1rem;left:1.1rem;border-radius:50px;padding:.36rem .9rem;font-size:.73rem;letter-spacing:.08em;display:none;}
#back-btn{top:3.4rem;left:1.1rem;border-radius:50px;padding:.36rem .9rem;font-size:.73rem;letter-spacing:.08em;display:none;}
#mute-btn:hover,#back-btn:hover,#prev-btn:hover{color:#fff;border-color:rgba(255,255,255,.38);background:rgba(255,255,255,.13);}

/* SCENE ANIMATIONS */
.star{position:absolute;background:#fff;border-radius:50%;animation:twink ease-in-out infinite alternate;}
@keyframes twink{from{opacity:.12}to{opacity:.82}}
.cloud-shape{position:absolute;border-radius:50px;background:rgba(255,255,255,.1);animation:cdrift linear infinite;}
@keyframes cdrift{from{transform:translateX(-220px)}to{transform:translateX(110vw)}}
.ripple{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,.11);animation:rout 3.5s ease-out infinite;}
@keyframes rout{0%{transform:scale(.4);opacity:.65}100%{transform:scale(3.5);opacity:0}}
.bubble{position:absolute;border-radius:50%;background:rgba(120,190,255,.16);border:1px solid rgba(120,190,255,.22);animation:brise linear infinite;}
@keyframes brise{from{transform:translateY(0);opacity:0}10%{opacity:.55}90%{opacity:.25}to{transform:translateY(-90vh);opacity:0}}
.firefly{position:absolute;width:3px;height:3px;background:#b8ff9f;border-radius:50%;box-shadow:0 0 7px #b8ff9f;animation:ffmove ease-in-out infinite alternate;}
@keyframes ffmove{from{transform:translate(0,0);opacity:.1}to{transform:translate(var(--fx),var(--fy));opacity:.92}}
.rdrop{position:absolute;width:1px;background:linear-gradient(to bottom,transparent,rgba(155,185,255,.52));animation:rfall linear infinite;}
@keyframes rfall{from{transform:translateY(-40px);opacity:0}10%{opacity:1}90%{opacity:1}to{transform:translateY(110vh);opacity:0}}
.pool-tiles{position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 49px,rgba(255,255,255,.045) 49px,rgba(255,255,255,.045) 51px),repeating-linear-gradient(0deg,transparent,transparent 49px,rgba(255,255,255,.045) 49px,rgba(255,255,255,.045) 51px);}
.pool-lane{position:absolute;top:0;bottom:0;width:2px;background:rgba(200,220,255,.08);}
.caustic{position:absolute;border-radius:40%;background:rgba(140,200,255,.07);filter:blur(9px);animation:causticShift ease-in-out infinite alternate;}
@keyframes causticShift{0%{transform:scale(1) translate(0,0) rotate(0deg);opacity:.05}100%{transform:scale(1.6) translate(var(--cx),var(--cy)) rotate(25deg);opacity:.13}}
.sand-sp{position:absolute;background:rgba(255,225,140,.45);border-radius:50%;animation:twink ease-in-out infinite alternate;}
.wave-sh{position:absolute;bottom:0;left:0;right:0;height:35%;background:linear-gradient(to top,rgba(0,80,160,.32),transparent);animation:wpulse 5s ease-in-out infinite alternate;}
@keyframes wpulse{from{transform:scaleY(1)}to{transform:scaleY(1.1)}}
.leaf-par{position:absolute;width:2px;height:2px;background:rgba(110,200,90,.45);border-radius:50%;animation:lfmove ease-in-out infinite alternate;}
@keyframes lfmove{from{transform:translate(0,0);opacity:.15}to{transform:translate(var(--lx),var(--ly));opacity:.75}}

/* SCREEN BACK BUTTON */
.s-back{position:absolute;top:1.3rem;left:1.3rem;background:none;border:none;color:rgba(255,255,255,.3);font-size:.75rem;cursor:pointer;letter-spacing:.08em;font-family:inherit;transition:color .2s;padding:.3rem .4rem;z-index:10;}
.s-back:hover{color:rgba(255,255,255,.72);}

/* DISCLAIMER */
.disc-open-btn{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);background:none;border:none;color:rgba(255,255,255,.18);font-size:.64rem;cursor:pointer;letter-spacing:.12em;font-family:inherit;transition:color .22s;white-space:nowrap;}
.disc-open-btn:hover{color:rgba(255,255,255,.52);}
#disc-modal{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s ease;}
#disc-modal.vis{opacity:1;pointer-events:all;}
.disc-box{background:#1c1528;border:1px solid rgba(255,255,255,.11);border-radius:20px;padding:2.2rem 1.9rem;max-width:310px;width:88%;text-align:center;}
.disc-title{font-size:.9rem;color:rgba(255,255,255,.7);letter-spacing:.14em;margin-bottom:1.1rem;}
.disc-body{font-size:.8rem;color:rgba(255,255,255,.44);line-height:2;letter-spacing:.04em;margin-bottom:1.8rem;}
.disc-close{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.55);padding:.5rem 1.6rem;border-radius:50px;font-size:.8rem;cursor:pointer;letter-spacing:.08em;font-family:inherit;transition:all .25s;}
.disc-close:hover{border-color:rgba(255,255,255,.5);color:#fff;}

/* NAME INPUT SCREEN */
#name-input{background:linear-gradient(160deg,#090912 0%,#0f0e1f 45%,#1a1230 100%);transition:background 1.8s ease;}
.name-q{font-size:.9rem;color:rgba(255,255,255,.52);letter-spacing:.14em;margin-bottom:1.6rem;text-align:center;}
.name-wrap{display:flex;align-items:center;gap:.8rem;}
.name-field{background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.28);color:#fff;font-size:1.1rem;letter-spacing:.1em;padding:.55rem .4rem;outline:none;font-family:inherit;width:190px;text-align:center;transition:border-color .3s;}
.name-field::placeholder{color:rgba(255,255,255,.22);}
.name-field:focus{border-bottom-color:rgba(255,255,255,.68);}
.name-submit{background:none;border:1px solid rgba(255,255,255,.26);color:rgba(255,255,255,.6);border-radius:50%;width:38px;height:38px;font-size:1.1rem;cursor:pointer;transition:all .25s;font-family:inherit;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.name-submit:hover{border-color:#fff;color:#fff;background:rgba(255,255,255,.08);}
.name-skip{margin-top:1.6rem;font-size:.68rem;color:rgba(255,255,255,.2);letter-spacing:.12em;cursor:pointer;transition:color .2s;}
.name-skip:hover{color:rgba(255,255,255,.48);}

/* WELCOME MSG SCREEN */
#welcome-msg{background:linear-gradient(160deg,#1a0a05 0%,#3d1608 30%,#7a3010 60%,#c26030 85%,#e8945a 100%);}
.wm-text{font-size:.9rem;line-height:2.3;color:rgba(255,255,255,.86);letter-spacing:.06em;text-align:center;max-width:310px;opacity:0;transform:translateY(12px);transition:opacity 1.4s ease,transform 1.4s ease;white-space:pre-line;}
.wm-text.show{opacity:1;transform:translateY(0);}
.wm-btn{margin-top:2.6rem;background:none;border:1px solid rgba(255,255,255,.26);color:rgba(255,255,255,.62);padding:.7rem 2.2rem;border-radius:50px;font-size:.86rem;cursor:pointer;letter-spacing:.12em;transition:all .3s;font-family:inherit;opacity:0;pointer-events:none;}
.wm-btn.vis{opacity:1;pointer-events:all;}
.wm-btn:hover{border-color:rgba(255,255,255,.72);color:#fff;}

/* MULTI-BUBBLE MESSAGE CONTAINER */
#msg-container{display:flex;flex-direction:column;gap:.9rem;align-items:center;width:100%;}
.msg-bubble{display:inline-block;font-size:.95rem;line-height:2;color:rgba(255,255,255,.92);letter-spacing:.06em;text-shadow:0 2px 24px rgba(0,0,0,.9),0 0 40px rgba(0,0,0,.6);opacity:0;transition:opacity .9s ease,transform .9s ease;transform:translateY(8px);}
.msg-bubble.show{opacity:1;transform:translateY(0);}
.msg-bubble.out{opacity:0;transform:translateY(-8px);}

/* RWD — MOBILE */
@media(max-width:390px){
  #sanctuary-time-panel{bottom:4rem;gap:.38rem;}
  .t-btn{padding:.44rem .85rem;font-size:.76rem;}
  #vol-panel{top:3.6rem;right:.65rem;}
  input[type=range]{width:58px;}
  .mood-label{min-width:155px;padding:.65rem 1.3rem;}
  .wm-text{font-size:.84rem;}
  .msg-bubble{font-size:.88rem;}
  .disc-box{padding:1.8rem 1.4rem;}
}
@media(max-height:620px){
  .fig-wrap{bottom:10%;}
  #sanctuary-time-panel{bottom:3.4rem;}
  #time-adjust-hint{bottom:6.8rem;}
  .msg-center{top:44%;}
}
</style>
</head>
<body>

<div id="disc-modal">
  <div class="disc-box">
    <p class="disc-title">使用聲明</p>
    <p class="disc-body">本服務為情緒陪伴工具，不具備任何醫療、心理治療或心理諮商功能，內容不構成任何醫療建議。若你正在經歷心理健康困難，請尋求專業醫療或心理健康服務。</p>
    <button class="disc-close" onclick="hideDisclaimer()">我了解了</button>
  </div>
</div>

<div id="loading"><div class="ldot"></div><div class="ldot"></div><div class="ldot"></div></div>

<div class="screen" id="welcome">
  <h1>你不用做什麼<br>只是來這裡休息一下</h1>
  <p>這裡有一個地方，一直為你留著</p>
  <button class="enter-btn" id="enter-btn">進來</button>
  <button class="disc-open-btn" onclick="showDisclaimer()">使用聲明</button>
</div>

<div class="screen hidden" id="how-to">
  <button class="s-back" onclick="goTo('welcome')">← 返回</button>
  <p class="how-to-title">使用說明</p>
  <div class="how-to-steps">
    <div class="how-to-step"><div class="how-step-num">1</div><div class="how-step-text">打開聲音到舒適的音量</div></div>
    <div class="how-to-step"><div class="how-step-num">2</div><div class="how-step-text">選擇最符合你的狀態</div></div>
    <div class="how-to-step"><div class="how-step-num">3</div><div class="how-step-text">選擇你想躺下的環境、時間</div></div>
    <div class="how-to-step"><div class="how-step-num">4</div><div class="how-step-text">好好的被接住</div></div>
  </div>
  <button class="how-to-btn" id="how-to-btn" onclick="enterMood()">我準備好了 →</button>
</div>

<div class="screen hidden" id="mood">
  <button class="s-back" onclick="goTo('how-to')">← 返回</button>
  <p class="pick-title">你現在是什麼狀態？</p>
  <div class="mood-single">
    <button class="mood-arr" onclick="moveMood(-1)">‹</button>
    <div class="mood-label-viewport" id="mood-label-viewport">
      <div class="mood-label" id="mood-label"></div>
    </div>
    <button class="mood-arr" onclick="moveMood(1)">›</button>
  </div>
  <button class="nxt vis" id="mood-nxt">繼續 →</button>
</div>

<div class="screen hidden" id="name-input">

// ─── AUDIO ENGINE ──────────────────────────────────────────────
function ensureAudio() {
  if (audioStarted) return;
  audioStarted=true;
  try {
    audioCtx = new(window.AudioContext||window.webkitAudioContext)();
    gainMaster = audioCtx.createGain();
    gainMaster.gain.value = 0.18;
    gainMaster.connect(audioCtx.destination);
    sceneNoiseGain = audioCtx.createGain();
    sceneNoiseGain.gain.value = 1;
    noiseVolumeGain = audioCtx.createGain();
    noiseVolumeGain.gain.value = parseFloat(document.getElementById('noise-vol').value)/100;
    musicVolumeGain = audioCtx.createGain();
    musicVolumeGain.gain.value = parseFloat(document.getElementById('music-vol').value)/100;
    sceneNoiseGain.connect(noiseVolumeGain);
    noiseVolumeGain.connect(gainMaster);
    musicVolumeGain.connect(gainMaster);
    playWelcomeAmbient();
  } catch(e){}
}

function makeNoiseBuf(dur) {
  if (!audioCtx) return null;
  const len=audioCtx.sampleRate*dur;
  const buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  return buf;
}
// Pink noise (1/f spectrum) — warm natural texture, like open air or rustling leaves
function makePinkNoiseBuf(dur) {
  if(!audioCtx) return null;
  const sr=audioCtx.sampleRate, len=sr*dur;
  const buf=audioCtx.createBuffer(1,len,sr);
  const d=buf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for(let i=0;i<len;i++){
    const w=Math.random()*2-1;
    b0=0.99886*b0+w*0.0555179;
    b1=0.99332*b1+w*0.0750759;
    b2=0.96900*b2+w*0.1538520;
    b3=0.86650*b3+w*0.3104856;
    b4=0.55000*b4+w*0.5329522;
    b5=-0.7616*b5-w*0.0168980;
    d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;
    b6=w*0.115926;
  }
  return buf;
}
// Brown noise (-6dB/octave) — deep full rumble, like heavy rain or waterfall
function makeBrownNoiseBuf(dur) {
  if(!audioCtx) return null;
  const sr=audioCtx.sampleRate, len=sr*dur;
  const buf=audioCtx.createBuffer(1,len,sr);
  const d=buf.getChannelData(0);
  let last=0;
  for(let i=0;i<len;i++){
    const w=Math.random()*2-1;
    last=(last+0.02*w)/1.02;
    d[i]=last*3.5;
  }
  return buf;
}

function stopNodes(arr) {
  arr.forEach(n=>{try{if(n.stop)n.stop();if(n.disconnect)n.disconnect();}catch(e){}});
  arr.length=0;
}

function clickSound() {
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type='sine'; o.frequency.value=1300;
  g.gain.setValueAtTime(0.1,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.065);
  o.connect(g); g.connect(gainMaster);
  o.start(); o.stop(audioCtx.currentTime+0.08);
}

// Welcome ambient — gentle pentatonic arpeggios
function playWelcomeAmbient() {
  stopNodes(welcomeNodes);
  if(!audioCtx) return;
  const scale=[261.6,293.7,329.6,392.0,440.0,523.3];
  function sched() {
    if(!audioCtx||audioCtx.state==='closed') return;
    const f=scale[Math.floor(Math.random()*scale.length)]*(Math.random()<.45?1:2);
    const o=audioCtx.createOscillator(), e=audioCtx.createGain();
    o.type='sine'; o.frequency.value=f;
    const t=audioCtx.currentTime;
    e.gain.setValueAtTime(0,t);
    e.gain.linearRampToValueAtTime(0.032,t+1.4);
    e.gain.linearRampToValueAtTime(0,t+4.8);
    o.connect(e); e.connect(gainMaster);
    o.start(t); o.stop(t+5.2);
    welcomeNodes.push(o);
    const tid=setTimeout(sched,1700+Math.random()*1800);
    welcomeNodes.push({stop:()=>clearTimeout(tid),disconnect:()=>{}});
  }
  sched(); setTimeout(sched,800);
}

// Scene white noise — quieter, scene-specific
function playSceneNoise(sceneId) {
  stopNodes(sceneNoiseNodes);
  if(!audioCtx||!sceneNoiseGain) return;
  const nb=makeNoiseBuf(5);
  if(!nb) return;

  // 1-second fade in via sceneNoiseGain
  const t0=audioCtx.currentTime;
  sceneNoiseGain.gain.cancelScheduledValues(t0);
  sceneNoiseGain.gain.setValueAtTime(0,t0);
  sceneNoiseGain.gain.linearRampToValueAtTime(1,t0+1.0);

  function addLayer(buf,filterType,freq,q,gainVal,playbackRate) {
    const src=audioCtx.createBufferSource();
    src.buffer=buf; src.loop=true;
    if(playbackRate) src.playbackRate.value=playbackRate;
    const f=audioCtx.createBiquadFilter();
    f.type=filterType; f.frequency.value=freq;
    if(q) f.Q.value=q;
    const g=audioCtx.createGain(); g.gain.value=gainVal;
    src.connect(f); f.connect(g); g.connect(sceneNoiseGain);
    src.start(); return {src,g,f};
  }
  function addLFO(gainNode,rate,depth) {
    const lfo=audioCtx.createOscillator(), lg=audioCtx.createGain();
    lfo.frequency.value=rate; lg.gain.value=depth;
    lfo.connect(lg); lg.connect(gainNode.gain); lfo.start();
    return lfo;
  }

  if(sceneId==='ocean') {
    // Ocean: deep wave rumble + mid surge
    const l1=addLayer(nb,'lowpass',80,0.5,0.32);
    const l2=addLayer(nb,'bandpass',280,0.4,0.15,0.75);
    const lfo1=addLFO(l1.g,0.09,0.14);
    const lfo2=addLFO(l2.g,0.12,0.08);
    sceneNoiseNodes.push(l1.src,l2.src,lfo1,lfo2);
    scheduleBubbles();
  } else if(sceneId==='pool') {
    // Pool: 100% 水中音 ASMR — immersive underwater (brown noise base for depth + muffled mid resonance)
    const bnb2=makeBrownNoiseBuf(5);
    const l1=addLayer(bnb2,'lowpass',60,0.5,0.24);    // deep water pressure (brown noise)
    const l2=addLayer(bnb2,'bandpass',90,3.0,0.16);   // underwater resonance hum
    const l3=addLayer(nb,'lowpass',200,1.5,0.10);     // muffled water body texture
    const l4=addLayer(nb,'bandpass',400,2.0,0.05);    // subtle mid presence (underwater character)
    const l5=addLayer(bnb2,'bandpass',160,1.8,0.08);  // low-mid underwater envelope
    // Very slow deep current pulsing
    const lfo1=addLFO(l1.g,0.035,0.10); // ~28s deep pressure swell
    const lfo2=addLFO(l2.g,0.055,0.07);
    const lfo3=addLFO(l5.g,0.045,0.04);
    sceneNoiseNodes.push(l1.src,l2.src,l3.src,l4.src,l5.src,lfo1,lfo2,lfo3);
    // Soft muffled bubble sounds — heavily filtered, deep, slow
    function poolBubble() {
      if(!audioCtx||audioCtx.state==='closed') return;
      const nb2=makeBrownNoiseBuf(0.35);
      if(!nb2) return;
      const s=audioCtx.createBufferSource();
      const f1=audioCtx.createBiquadFilter(), f2=audioCtx.createBiquadFilter();
      const e=audioCtx.createGain();
      s.buffer=nb2;
      f1.type='lowpass'; f1.frequency.value=120; f1.Q.value=2.0;
      f2.type='bandpass'; f2.frequency.value=80+Math.random()*60; f2.Q.value=1.5;
      const t=audioCtx.currentTime;
      e.gain.setValueAtTime(0,t);
      e.gain.linearRampToValueAtTime(0.06+Math.random()*0.03,t+0.06);
      e.gain.exponentialRampToValueAtTime(0.001,t+0.30);
      s.connect(f1); f1.connect(f2); f2.connect(e); e.connect(sceneNoiseGain);
      s.start(t); s.stop(t+0.40);
      const tid=setTimeout(poolBubble, 1500+Math.random()*4000);
      sceneNoiseNodes.push({stop:()=>clearTimeout(tid),disconnect:()=>{}});
    }
    poolBubble();
    setTimeout(poolBubble,2200);
  } else if(sceneId==='beach') {
    // Beach: wave rush + high foam
    const l1=addLayer(nb,'lowpass',180,0.5,0.28);
    const l2=addLayer(nb,'highpass',2000,0.8,0.07,1.4);
    const lfo1=addLFO(l1.g,0.13,0.16);
    const lfo2=addLFO(l2.g,0.17,0.05);
    sceneNoiseNodes.push(l1.src,l2.src,lfo1,lfo2);
  } else if(sceneId==='forest') {
    // Forest: slow wind gusts through leaves (very slow LFO, no tremolo)
    const l1=addLayer(nb,'bandpass',380,0.7,0.24);   // main leaf rustle
    const l2=addLayer(nb,'bandpass',1100,1.2,0.09,1.3); // higher leaf layer
    const lfo1=addLFO(l1.g,0.08,0.16); // ~12s wind gust cycle
    const lfo2=addLFO(l2.g,0.11,0.07); // slightly faster upper layer
    sceneNoiseNodes.push(l1.src,l2.src,lfo1,lfo2);
  } else if(sceneId==='rain') {
    // Rain: 雷雨聲助眠 — full heavy rainstorm, brown noise body + rolling thunder
    const bnb=makeBrownNoiseBuf(5);
    const l1=addLayer(bnb,'bandpass',500,0.35,0.17);   // deep rain body (brown noise — full & warm)
    const l2=addLayer(bnb,'bandpass',1200,0.5,0.10);   // mid rain thickness
    const l3=addLayer(nb,'bandpass',2800,0.55,0.07);   // rain patter texture (white noise)
    const l4=addLayer(nb,'bandpass',5000,1.0,0.022);   // high rain hiss/spray
    const l5=addLayer(bnb,'lowpass',70,0.5,0.08);      // constant deep pressure bed
    const lfo1=addLFO(l1.g,0.04,0.15); // ~25s slow rain intensity swell
    const lfo2=addLFO(l2.g,0.06,0.08);
    const lfo3=addLFO(l3.g,0.075,0.05);
    sceneNoiseNodes.push(l1.src,l2.src,l3.src,l4.src,l5.src,lfo1,lfo2,lfo3);
    // Subtle roof drops — brown noise micro-burst, blend into the rain bed
    function raindrop() {
      if(!audioCtx||audioCtx.state==='closed') return;
      const nb2=makeBrownNoiseBuf(0.04);
      if(!nb2) return;
      const s=audioCtx.createBufferSource(), f=audioCtx.createBiquadFilter(), e=audioCtx.createGain();
      s.buffer=nb2;
      f.type='bandpass'; f.frequency.value=800+Math.random()*1400; f.Q.value=1.8;
      const t=audioCtx.currentTime;
      e.gain.setValueAtTime(0.013+Math.random()*0.011,t);
      e.gain.exponentialRampToValueAtTime(0.001,t+0.035);
      s.connect(f); f.connect(e); e.connect(sceneNoiseGain);
      s.start(t); s.stop(t+0.05);
      const tid=setTimeout(raindrop, 30+Math.random()*100);
      sceneNoiseNodes.push({stop:()=>clearTimeout(tid),disconnect:()=>{}});
    }
    // Thunder: deep rolling rumble — double-filtered brown noise, dramatic but soothing
    function thunder() {
      if(!audioCtx||audioCtx.state==='closed') return;
      const dur=6+Math.random()*5;
      const tb=makeBrownNoiseBuf(dur+1.5);
      if(!tb) return;
      const s=audioCtx.createBufferSource();
      const f1=audioCtx.createBiquadFilter(), f2=audioCtx.createBiquadFilter();
      const e=audioCtx.createGain();
      s.buffer=tb;
      f1.type='lowpass'; f1.frequency.value=130; f1.Q.value=0.8;
      f2.type='lowpass'; f2.frequency.value=200; f2.Q.value=0.5;
      const t=audioCtx.currentTime;
      const peak=0.32+Math.random()*0.14;
      e.gain.setValueAtTime(0,t);
      e.gain.linearRampToValueAtTime(peak*0.4,t+0.6);    // initial rumble crack
      e.gain.linearRampToValueAtTime(peak,t+1.6);        // rolling build
      e.gain.setValueAtTime(peak,t+2.5);                 // sustain peak
      e.gain.linearRampToValueAtTime(peak*0.3,t+dur*0.6);// slow decay
      e.gain.exponentialRampToValueAtTime(0.001,t+dur+1); // fade to silence
      s.connect(f1); f1.connect(f2); f2.connect(e); e.connect(sceneNoiseGain);
      s.start(t); s.stop(t+dur+1.5);
      const tid=setTimeout(thunder, 10000+Math.random()*18000);
      sceneNoiseNodes.push({stop:()=>clearTimeout(tid),disconnect:()=>{}});
    }
    raindrop();
    setTimeout(raindrop,35); setTimeout(raindrop,70);
    setTimeout(thunder, 3000+Math.random()*5000);
  } else if(sceneId==='clouds') {
    // Clouds: 天空白噪音 — pink noise for warm natural sky ambient (1/f spectrum)
    const pnb=makePinkNoiseBuf(5);
    const l1=addLayer(pnb,'lowpass',5500,0.5,0.09);   // main pink noise body — smooth, warm, open
    const l2=addLayer(pnb,'bandpass',350,0.35,0.04);  // subtle low-mid warmth
    const l3=addLayer(pnb,'bandpass',1200,0.5,0.02);  // gentle mid air presence
    // Extremely slow, almost imperceptible drift
    const lfo1=addLFO(l1.g,0.022,0.015); // ~45s cycle, barely there
    sceneNoiseNodes.push(l1.src,l2.src,l3.src,lfo1);
  }
}

function scheduleBubbles() {
  if(!audioCtx||audioCtx.state==='closed') return;
  const o=audioCtx.createOscillator(), e=audioCtx.createGain();
  o.type='sine'; o.frequency.value=350+Math.random()*500;
  e.gain.setValueAtTime(0,audioCtx.currentTime);
  e.gain.linearRampToValueAtTime(0.028,audioCtx.currentTime+0.012);
  e.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.42);
  o.connect(e); e.connect(sceneNoiseGain);
  o.start(); o.stop(audioCtx.currentTime+0.46);
  const tid=setTimeout(scheduleBubbles,700+Math.random()*3200);
  sceneNoiseNodes.push({stop:()=>clearTimeout(tid),disconnect:()=>{}});
}

// Time-based ambient music — layered on top of noise
function playTimedMusic(timeId) {
  stopNodes(sceneMusicNodes);
  if(!audioCtx) return;
  const cfg=timeMusic[timeId];
  if(!cfg) return;

  function schedNote() {
    if(!audioCtx||audioCtx.state==='closed') return;
    const scale=cfg.scale;
    let f=scale[Math.floor(Math.random()*scale.length)];
    if(cfg.octaveShift && Math.random()<0.3) f*=2;
    const o=audioCtx.createOscillator(), e=audioCtx.createGain();
    o.type='sine'; o.frequency.value=f;
    const t=audioCtx.currentTime;
    const atk=timeId==='night'?2.5:1.5;
    e.gain.setValueAtTime(0,t);
    e.gain.linearRampToValueAtTime(cfg.gain,t+atk);
    e.gain.linearRampToValueAtTime(0,t+cfg.noteLen);
    const mDst=musicVolumeGain||gainMaster;
    o.connect(e); e.connect(mDst);
    o.start(t); o.stop(t+cfg.noteLen+0.2);
    sceneMusicNodes.push(o);

    // Occasional harmony for day
    if(timeId==='day' && Math.random()<0.4) {
      const o2=audioCtx.createOscillator(), e2=audioCtx.createGain();
      o2.type='sine'; o2.frequency.value=f*1.5;
      e2.gain.setValueAtTime(0,t+0.3);
      e2.gain.linearRampToValueAtTime(cfg.gain*0.55,t+atk+0.3);
      e2.gain.linearRampToValueAtTime(0,t+cfg.noteLen);
      o2.connect(e2); e2.connect(mDst);
      o2.start(t+0.3); o2.stop(t+cfg.noteLen+0.2);
      sceneMusicNodes.push(o2);
    }

    const delay=cfg.interval[0]+Math.random()*(cfg.interval[1]-cfg.interval[0]);
    const tid=setTimeout(schedNote,delay);
    sceneMusicNodes.push({stop:()=>clearTimeout(tid),disconnect:()=>{}});
  }
  schedNote();
  // Stagger second voice
  const tid=setTimeout(schedNote,cfg.interval[0]*0.6);
  sceneMusicNodes.push({stop:()=>clearTimeout(tid),disconnect:()=>{}});
}

// ─── INFINITE CAROUSEL ─────────────────────────────────────────
// Track layout: [clone-of-last, scene0..sceneN-1, clone-of-first]
// carIdx: 0=clone-last, 1..N=real scenes, N+1=clone-first
function buildCarousel() {
  const track=document.getElementById('carousel-track');
  const dots=document.getElementById('dot-row');
  track.innerHTML=''; dots.innerHTML='';

  // Extended slides: last clone + all scenes + first clone
  const extended=[scenes[N-1],...scenes,scenes[0]];
  extended.forEach((sc,i)=>{
    const slide=document.createElement('div');
    slide.className='c-slide';
    slide.style.background=sc.times.night.grad;
    const lbl=document.createElement('div');
    lbl.className='scene-pick-label'; lbl.textContent='選擇一個你想躺著的地方';
    const pfx=document.createElement('div'); pfx.className='slide-particles';
    addSceneParticles(pfx,sc.id,true);
    const ov=document.createElement('div'); ov.className='slide-overlay';
    const info=document.createElement('div'); info.className='slide-info';
    info.innerHTML=`<div class="slide-name">${sc.label}</div><div class="slide-desc">${sc.description}</div><div class="slide-tap-hint">點擊選擇這個地方</div>`;
    slide.appendChild(lbl); slide.appendChild(pfx); slide.appendChild(ov); slide.appendChild(info);
    // Only real slides (indices 1..N) are selectable
    const realIdx=i-1;
    slide.onclick=()=>{ if(!dragMoved && realIdx>=0 && realIdx<N) { ensureAudio(); clickSound(); confirmScene(realIdx); } };
    track.appendChild(slide);
  });

  // Dot indicators
  for(let i=0;i<N;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===0?' active':'');
    dots.appendChild(d);
  }

  carIdx=1;
  setPos(1,false);
  initDrag();

  track.addEventListener('transitionend',e=>{
    if(e.propertyName!=='transform') return;
    isTransitioning=false;
    if(carIdx===0){ setPos(N,false); carIdx=N; }
    else if(carIdx===N+1){ setPos(1,false); carIdx=1; }
    updateDots();
    if(audioCtx) playSceneNoise(scenes[getRealIdx()].id);
  });
}

function setPos(idx,animated) {
  const track=document.getElementById('carousel-track');
  if(!track) return;
  track.style.transition=animated?'transform .5s cubic-bezier(.25,.1,.25,1)':'none';
  track.style.transform=`translateX(-${idx*100}vw)`;
}

function moveCarousel(dir) {
  if(isTransitioning) return;
  clickSound();
  isTransitioning=true;
  carIdx+=dir;
  setPos(carIdx,true);
  if(carIdx!==0 && carIdx!==N+1) updateDots();
}

function getRealIdx() { return((carIdx-1+N)%N); }

function updateDots() {
  const r=getRealIdx();
  document.querySelectorAll('.dot').forEach((d,i)=>d.className='dot'+(i===r?' active':''));
}

let dragStartX=0, dragging=false;
function initDrag() {
  const vp=document.getElementById('carousel-vp');
  if(!vp) return;
  const gx=e=>e.touches?e.touches[0].clientX:e.clientX;
  vp.addEventListener('mousedown',e=>{dragStartX=gx(e);dragging=true;dragMoved=false;});
  vp.addEventListener('touchstart',e=>{dragStartX=gx(e);dragging=true;dragMoved=false;},{passive:true});
  vp.addEventListener('mousemove',e=>{if(dragging&&Math.abs(gx(e)-dragStartX)>6)dragMoved=true;});
  vp.addEventListener('touchmove',e=>{if(dragging&&Math.abs(gx(e)-dragStartX)>6)dragMoved=true;},{passive:true});
  function end(e){
    if(!dragging)return; dragging=false;
    const ex=e.changedTouches?e.changedTouches[0].clientX:(e.clientX||dragStartX);
    const dx=ex-dragStartX;
    if(dragMoved&&Math.abs(dx)>48) moveCarousel(dx<0?1:-1);
  }
  vp.addEventListener('mouseup',end);
  vp.addEventListener('touchend',end,{passive:true});
}

// ─── MULTI-BUBBLE MESSAGE SYSTEM ───────────────────────────────
function addSanctuaryMsg() {
  const container=document.getElementById('msg-container');
  if(!container) return;
  // If at max, remove oldest first then continue to add new message
  if(activeMsgCount>=MAX_MSGS){
    const oldest=container.querySelector('.msg-bubble');
    if(oldest){
      if(oldest._ft) clearTimeout(oldest._ft);
      oldest.classList.remove('show'); oldest.classList.add('out');
      setTimeout(()=>{if(oldest.parentNode)oldest.parentNode.removeChild(oldest);},900);
      activeMsgCount=Math.max(0,activeMsgCount-1);
    }
  }
  const txt=msgList[msgIdx%msgList.length]; msgIdx++;
  const el=document.createElement('div'); el.className='msg-bubble';
  el.textContent=txt; container.appendChild(el); activeMsgCount++;
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  // Auto-fade after 10s
  el._ft=setTimeout(()=>{
    el.classList.remove('show'); el.classList.add('out');
    setTimeout(()=>{ if(el.parentNode)el.parentNode.removeChild(el); activeMsgCount=Math.max(0,activeMsgCount-1); },900);
  },10000);
}
function schedNextMsg() {
  if(msgAutoTimer) clearTimeout(msgAutoTimer);
  const delay=14000+Math.random()*6000;
  msgAutoTimer=setTimeout(()=>{ addSanctuaryMsg(); schedNextMsg(); },delay);
}
function clearSanctuaryMsgs() {
  if(msgAutoTimer){ clearTimeout(msgAutoTimer); msgAutoTimer=null; }
  activeMsgCount=0;
  const c=document.getElementById('msg-container');
  if(c) c.innerHTML='';
}

function figSVG(id,rgb){
  const s=`rgba(${rgb},.88)`,f=`rgba(${rgb},.13)`;
  if(id==='clouds')return`<ellipse cx="60" cy="78" rx="52" ry="15" fill="rgba(255,255,255,.09)" stroke="rgba(255,255,255,.18)" stroke-width=".8"/><ellipse cx="45" cy="70" rx="20" ry="13" fill="rgba(255,255,255,.07)"/><ellipse cx="62" cy="66" rx="24" ry="15" fill="rgba(255,255,255,.07)"/><ellipse cx="78" cy="71" rx="17" ry="12" fill="rgba(255,255,255,.05)"/><ellipse cx="62" cy="68" rx="28" ry="7" fill="${f}" stroke="${s}" stroke-width="1.1"/><circle cx="86" cy="65" r="7.5" fill="${f}" stroke="${s}" stroke-width="1.1"/><path d="M34 68 Q28 59 37 55 Q44 52 46 60" fill="none" stroke="${s}" stroke-width="1.1" stroke-linecap="round"/>`;
  if(id==='ocean'||id==='pool')return`<ellipse cx="62" cy="74" rx="50" ry="9" fill="rgba(${rgb},.1)" stroke="rgba(${rgb},.22)" stroke-width=".8"/><ellipse cx="60" cy="70" rx="29" ry="6.5" fill="${f}" stroke="${s}" stroke-width="1.1"/><circle cx="86" cy="66" r="7.5" fill="${f}" stroke="${s}" stroke-width="1.1"/><path d="M42 68 Q35 57 29 62" fill="none" stroke="${s}" stroke-width="1.1" stroke-linecap="round"/><path d="M78 68 Q83 57 76 55" fill="none" stroke="${s}" stroke-width="1.1" stroke-linecap="round"/>`;
  if(id==='beach')return`<ellipse cx="62" cy="80" rx="54" ry="11" fill="rgba(180,130,60,.18)" stroke="rgba(200,160,80,.18)" stroke-width=".8"/><ellipse cx="60" cy="72" rx="29" ry="7" fill="${f}" stroke="${s}" stroke-width="1.1"/><circle cx="86" cy="67" r="7.5" fill="${f}" stroke="${s}" stroke-width="1.1"/><path d="M86 73 Q90 80 82 82" fill="none" stroke="${s}" stroke-width="1.1" stroke-linecap="round"/>`;
  if(id==='forest')return`<ellipse cx="62" cy="81" rx="48" ry="9" fill="rgba(30,80,30,.28)" stroke="rgba(60,140,60,.18)" stroke-width=".8"/><ellipse cx="62" cy="73" rx="26" ry="7.5" fill="${f}" stroke="${s}" stroke-width="1.1"/><circle cx="85" cy="68" r="7.5" fill="${f}" stroke="${s}" stroke-width="1.1"/><path d="M36 73 Q29 63 40 58 Q47 55 47 64" fill="none" stroke="${s}" stroke-width="1.1" stroke-linecap="round"/><circle cx="22" cy="50" r="2.2" fill="#b8ff9f" opacity=".88"/><circle cx="22" cy="50" r="5" fill="rgba(180,255,160,.18)"/>`;
  if(id==='rain')return`<ellipse cx="62" cy="82" rx="46" ry="8" fill="rgba(${rgb},.09)" stroke="rgba(${rgb},.16)" stroke-width=".6"/><ellipse cx="60" cy="72" rx="27" ry="7" fill="${f}" stroke="${s}" stroke-width="1.1"/><circle cx="84" cy="67" r="7.5" fill="${f}" stroke="${s}" stroke-width="1.1"/><path d="M42 70 Q35 62 44 56 Q51 52 52 61" fill="none" stroke="${s}" stroke-width="1.1" stroke-linecap="round"/>`;
  return`<ellipse cx="62" cy="72" rx="29" ry="7" fill="${f}" stroke="${s}" stroke-width="1.1"/><circle cx="86" cy="67" r="7.5" fill="${f}" stroke="${s}" stroke-width="1.1"/>`;
}

// ─── INIT ──────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  buildMoodPicker(); buildCarousel();
  setTimeout(()=>document.getElementById('loading').classList.add('gone'),700);
});
document.getElementById('enter-btn').onclick=()=>{
  ensureAudio(); clickSound();
  showHowTo();
};
function showHowTo() {
  goTo('how-to');
  const steps=document.querySelectorAll('.how-to-step');
  steps.forEach(s=>{ s.classList.remove('show'); });
  const btn=document.getElementById('how-to-btn');
  btn.classList.remove('vis');
  steps.forEach((s,i)=>setTimeout(()=>s.classList.add('show'), 200+i*180));
  setTimeout(()=>btn.classList.add('vis'), 200+steps.length*180+250);
}
function enterMood() {
  clickSound();
  buildMoodPicker();
  goTo('mood');
}
document.getElementById('mood-nxt').onclick=()=>{
  clickSound();
  document.getElementById('name-field').value=''; // clear previous name
  goTo('name-input');
};
</script>
